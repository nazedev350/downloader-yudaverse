<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>YudaVerse — Universal Downloader</title>
  <link rel="icon" type="image/jpeg" href="logo.jpeg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Noto+Sans+JP:wght@400;700;900&family=M+PLUS+1p:wght@400;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loadScreen">
  <div class="ls-bg"></div>
  <div class="manga-lines"></div>
  <div class="ls-content">
    <div class="ls-ring-wrap">
      <svg class="ls-ring" viewBox="0 0 120 120" fill="none">
        <circle cx="60" cy="60" r="52" stroke="rgba(255,255,255,.07)" stroke-width="6"/>
        <circle cx="60" cy="60" r="52" stroke="url(#rg)" stroke-width="6" stroke-linecap="round" stroke-dasharray="326" stroke-dashoffset="240" class="ring-spin"/>
        <defs><linearGradient id="rg" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#ff3860"/><stop offset="50%" stop-color="#ff8c00"/><stop offset="100%" stop-color="#fff200"/></linearGradient></defs>
      </svg>
      <div class="ls-logo-wrap">
        <img class="ls-logo-img" src="logo.jpeg" alt="YudaVerse"/>
        <div class="ls-logo-border"></div>
      </div>
    </div>
    <p class="ls-brand">YudaVerse</p>
    <p class="ls-tagline">✦ LOADING STAGE... ✦</p>
    <div class="ls-dots"><span></span><span></span><span></span></div>
  </div>
</div>

<!-- PLATFORM PICKER -->
<div id="platformPicker" class="hidden">
  <div class="pp-bg"></div>
  <div class="manga-halftone"></div>
  <div class="pp-panel">
    <div class="pp-header">
      <div class="pp-logo">
        <div class="pp-logo-wrap">
          <img class="pp-logo-img" src="logo.jpeg" alt="YudaVerse"/>
          <div class="pp-logo-ring"></div>
        </div>
        <div class="pp-logo-texts">
          <span class="pp-logo-text">YudaVerse</span>
          <span class="pp-logo-sub">UNIVERSAL DOWNLOADER</span>
        </div>
      </div>
      <div class="pp-speech-bubble">
        <p class="pp-subtitle">Pilih platform yang mau kamu download, senpai! ✦</p>
      </div>
    </div>
    <div class="pp-grid">
      <button class="pp-card" data-p="facebook">
        <div class="pp-card-glow" style="--glow-c:#1877f2"></div>
        <div class="pp-card-icon">
          <svg viewBox="0 0 24 24" fill="#1877f2"><path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.874v2.25h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/></svg>
        </div>
        <span class="pp-card-name">Facebook</span>
        <span class="pp-card-desc">Video &amp; Reels</span>
        <div class="pp-card-check">&#10003;</div>
      </button>
      <button class="pp-card" data-p="tiktok">
        <div class="pp-card-glow" style="--glow-c:#fe2c55"></div>
        <div class="pp-card-icon" style="background:#010101;border-radius:10px">
          <svg viewBox="0 0 24 24" fill="#fff" style="width:70%;height:70%"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.77 1.52V6.73a4.85 4.85 0 01-1-.04z"/></svg>
        </div>
        <span class="pp-card-name">TikTok</span>
        <span class="pp-card-desc">Video &amp; Slide</span>
        <div class="pp-card-check">&#10003;</div>
      </button>
      <button class="pp-card" data-p="instagram">
        <div class="pp-card-glow" style="--glow-c:#e1306c"></div>
        <div class="pp-card-icon">
          <svg viewBox="0 0 24 24"><defs><radialGradient id="ig1" cx="30%" cy="107%" r="150%"><stop offset="0%" stop-color="#fdf497"/><stop offset="5%" stop-color="#fdf497"/><stop offset="45%" stop-color="#fd5949"/><stop offset="60%" stop-color="#d6249f"/><stop offset="90%" stop-color="#285AEB"/></radialGradient></defs><path fill="url(#ig1)" d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
        </div>
        <span class="pp-card-name">Instagram</span>
        <span class="pp-card-desc">Reels &amp; Post</span>
        <div class="pp-card-check">&#10003;</div>
      </button>
      <button class="pp-card" data-p="spotify">
        <div class="pp-card-glow" style="--glow-c:#1db954"></div>
        <div class="pp-card-icon">
          <svg viewBox="0 0 24 24" fill="#1db954"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
        </div>
        <span class="pp-card-name">Spotify</span>
        <span class="pp-card-desc">Lagu &amp; Track</span>
        <div class="pp-card-check">&#10003;</div>
      </button>
      <button class="pp-card" data-p="soundcloud">
        <div class="pp-card-glow" style="--glow-c:#ff5500"></div>
        <div class="pp-card-icon">
          <svg viewBox="0 0 24 24" fill="#ff5500"><path d="M1.175 12.225c-.017 0-.034.002-.05.006-.017-.004-.034-.006-.05-.006-.225 0-.407.182-.407.407v.001c0 .224.181.406.406.406.017 0 .034-.002.05-.006.017.004.034.006.05.006.225 0 .406-.181.406-.406v-.001c0-.225-.181-.407-.405-.407zm1.469-.83c-.025 0-.049.004-.073.01-.025-.006-.049-.01-.073-.01-.337 0-.609.272-.609.609v.001c0 .337.272.609.609.609.025 0 .049-.004.073-.01.025.006.049.01.073.01.337 0 .609-.272.609-.609v-.001c0-.337-.272-.609-.609-.609zM24 11.175c0-2.251-1.824-4.076-4.075-4.076-.285 0-.563.03-.832.087C18.48 5.648 16.91 4.5 15.075 4.5c-.583 0-1.137.131-1.631.364C12.503 3.124 11.059 2.25 9.419 2.25c-2.758 0-4.994 2.236-4.994 4.994 0 .152.007.302.021.45C2.906 8.151 2.25 9.184 2.25 10.35c0 1.763 1.429 3.192 3.192 3.192H20.6c1.874 0 3.4-1.525 3.4-3.4v-.032l.001.065z"/></svg>
        </div>
        <span class="pp-card-name">SoundCloud</span>
        <span class="pp-card-desc">Audio &amp; Mix</span>
        <div class="pp-card-check">&#10003;</div>
      </button>
      <button class="pp-card" data-p="twitter">
        <div class="pp-card-glow" style="--glow-c:#ffffff"></div>
        <div class="pp-card-icon" style="background:#000;border-radius:10px">
          <svg viewBox="0 0 24 24" fill="#fff" style="width:65%;height:65%"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.259 5.631 5.905-5.631zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </div>
        <span class="pp-card-name">X / Twitter</span>
        <span class="pp-card-desc">Video Tweet</span>
        <div class="pp-card-check">&#10003;</div>
      </button>
    </div>
    <button class="pp-cta" id="ppCta" disabled>
      <span id="ppCtaLabel">Pilih Platform</span>
      <span class="pp-cta-arrow">&#8594;</span>
    </button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">
  <header class="app-header">
    <div class="header-brand">
      <div class="header-logo-wrap">
        <img class="header-logo-img" src="logo.jpeg" alt="YudaVerse"/>
        <div class="header-logo-ring"></div>
      </div>
      <div class="header-titles">
        <span class="header-name">YudaVerse</span>
        <span class="header-sub">DOWNLOADER</span>
      </div>
    </div>
    <div class="header-right">
      <button class="header-btn" id="changePlatformBtn" title="Kembali">← Kembali</button>
    </div>
  </header>
  <div class="active-platform" id="activePlatformBadge">
    <div class="ap-icon" id="apIcon"></div>
    <div class="ap-text">
      <div class="ap-name" id="apName">Facebook Downloader</div>
      <div class="ap-desc" id="apDesc">Contoh: facebook.com/share/r/...</div>
    </div>
  </div>
  <!-- SPOTIFY TAB SWITCHER (only shown for spotify) -->
  <div id="spotifyTabs" class="sp-tabs hidden">
    <button class="sp-tab active" id="spTabSearch" onclick="switchSpTab('search')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Cari Lagu
    </button>
    <button class="sp-tab" id="spTabUrl" onclick="switchSpTab('url')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
      Paste URL
    </button>
  </div>

  <!-- SPOTIFY SEARCH PANEL -->
  <div id="spotifySearchPanel" class="hidden">
    <div class="sp-search-wrap">
      <div class="input-wrap">
        <span class="i-pfx" style="color:#1db954">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
        <input type="text" id="spSearchInput" placeholder="Cari judul lagu, artis..." autocomplete="off" spellcheck="false"/>
        <button id="spSearchClearBtn" class="clear-btn" title="Hapus">&#x2715;</button>
      </div>
      <button id="spSearchBtn" class="go-btn" style="background:linear-gradient(135deg,#0d7a3a,#1db954,#1ed760);background-size:200% 200%">
        <span>CARI LAGU</span>
        <span class="go-arr" style="animation:none">🎵</span>
      </button>
    </div>
    <div id="spSearchZone" style="display:none">
      <div id="spSearchLoad" class="z-load" style="display:none">
        <svg class="z-spinner" viewBox="0 0 50 50">
          <circle cx="25" cy="25" r="20" fill="none" stroke="#1db954" stroke-width="4" stroke-linecap="round" stroke-dasharray="100" stroke-dashoffset="60"/>
        </svg>
        <p style="color:#1db954">Mencari lagu...</p>
      </div>
      <div id="spSearchErr" class="z-err" style="display:none">
        <span class="z-err-ico">🎵</span>
        <p id="spSearchErrMsg"></p>
        <button onclick="resetSpSearch()">Coba Lagi</button>
      </div>
      <div id="spSearchResults" class="sp-results" style="display:none"></div>
    </div>
  </div>

  <div class="input-area" id="urlInputArea">
    <div class="input-wrap">
      <span class="i-pfx">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
      </span>
      <input type="url" id="urlInput" placeholder="Paste URL di sini, senpai~" autocomplete="off" spellcheck="false"/>
      <button id="clearBtn" class="clear-btn" title="Hapus">&#x2715;</button>
    </div>
    <button id="goBtn" class="go-btn">
      <span id="goBtnLbl">DOWNLOAD!</span>
      <span class="go-arr">↓</span>
    </button>
  </div>
  <div id="zone" class="zone" style="display:none">
    <div id="zLoad" class="z-load" style="display:none">
      <svg class="z-spinner" viewBox="0 0 50 50">
        <circle cx="25" cy="25" r="20" fill="none" stroke="url(#sg)" stroke-width="4" stroke-linecap="round" stroke-dasharray="100" stroke-dashoffset="60"/>
        <defs><linearGradient id="sg" x1="0" y1="0" x2="50" y2="50" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#ff3860"/><stop offset="100%" stop-color="#ff8c00"/></linearGradient></defs>
      </svg>
      <p>Mengambil data&hellip;</p>
    </div>
    <div id="zErr" class="z-err" style="display:none">
      <span class="z-err-ico">&#9888;&#65039;</span>
      <p id="zErrMsg"></p>
      <button onclick="resetUI()">Coba Lagi</button>
    </div>
    <div id="zMedia" class="mcard" style="display:none">
      <div class="mcard-cover-wrap">
        <img id="mCover" class="mcard-cover" alt="cover" style="display:none"/>
        <span id="mPtag" class="mcard-ptag tag-fb">FB</span>
      </div>
      <div class="mcard-body">
        <p id="mTitle" class="mcard-title"></p>
        <div id="mMeta" class="mcard-meta"></div>
        <div id="mLinks" class="mcard-links"></div>
      </div>
    </div>
  </div>
</div>


<audio id="bgAudio" loop preload="none"></audio>

<!-- MUSIC PLAYER BAR -->
<div id="musicPlayer" class="mp-bar">
  <div class="mp-waveform" id="mpWaveform">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span>
  </div>
  <div class="mp-controls">
    <button class="mp-btn mp-prev" id="mpPrevBtn" title="Lagu Sebelumnya">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
    </button>
    <button class="mp-btn mp-play" id="mpPlayBtn" title="Play / Pause">
      <svg class="mp-ico-play" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
      <svg class="mp-ico-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="5" y="3" width="4" height="18" rx="1"/><rect x="15" y="3" width="4" height="18" rx="1"/></svg>
    </button>
    <button class="mp-btn mp-next" id="mpNextBtn" title="Lagu Berikutnya">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
    </button>
  </div>
  <div class="mp-progress-area">
    <span class="mp-time" id="mpCurrent">0:00</span>
    <div class="mp-track" id="mpTrack">
      <div class="mp-fill" id="mpFill"></div>
      <div class="mp-thumb" id="mpThumb"></div>
    </div>
    <span class="mp-time" id="mpDuration">0:00</span>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
